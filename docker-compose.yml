version: '3.8'

services:
  # RAG_GOD Backend Service
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: rag-god-backend
    ports:
      - "8000:8000"
    volumes:
      - ./apps/rag_god:/app/apps/rag_god
      - ./apps/backend:/app/apps/backend
    environment:
      - RAG_GOD_MODE=0
      - PAPER_MODE=true
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Next.js Web Frontend
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: goldngoose-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_RAG_GOD_URL=http://backend:8000
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Optional: Redis for caching (uncomment if needed)
